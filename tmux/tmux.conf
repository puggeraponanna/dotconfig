set -g mouse on 
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind v send-keys "vim" "Enter"
bind b display-popup -w 85% -h 85% -S "bg=default,fg=#abb2bf" -b rounded -E ~/.config/tmux/scripts/git-branch.sh
bind e display-popup -w 85% -h 85% -S "bg=default,fg=#abb2bf" -b rounded -E ~/.config/tmux/scripts/tmux-sess.sh
bind g display-popup -w 85% -h 85% -S "bg=default,fg=#abb2bf" -b rounded -E lazygit
bind d display-popup -w 85% -h 85% -S "bg=default,fg=#abb2bf" -b rounded -E lazydocker

set -g status-right-length 100
set -g status-left-length 100
set -g status-right ""
set -g status-left "#[bg=#e5c07b,fg=#21252a]#[reverse]█#[noreverse]#S#[reverse]█#[bg=#21252a,fg=#21252a] "

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'

# Pill style window status and solid segments
set -g status-style "bg=#21252a,fg=#abb2bf"
set -g status-left "#[bg=#98c379,fg=#21252a,bold] #S #[bg=default]  "
set -g status-right "#[fg=#abb2bf,bg=#3e4452] %H:%M #[fg=#21252a,bg=#abb2bf] %d/%m/%Y #[fg=#21252a,bg=#98c379,bold] #h "
setw -g window-status-format "#[fg=#21252a,bg=#abb2bf] #I #[fg=#abb2bf,bg=#3e4452] #W "
setw -g window-status-current-format "#[fg=#21252a,bg=#e5c07b,bold] #I #[fg=#e5c07b,bg=#3e4452] #W "
set -g window-status-separator " "

set-window-option -g popup-style "bg=default"
