set -g mouse on 
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind v send-keys "vim" "Enter"
bind b display-popup -w 85% -h 85% -S "bg=default,fg=default" -b rounded -E ~/.config/tmux/scripts/git-branch.sh
bind e display-popup -w 85% -h 85% -S "bg=default,fg=default" -b rounded -E ~/.config/tmux/scripts/tmux-sess.sh
bind g display-popup -w 85% -h 85% -S "bg=default,fg=default" -b rounded -E lazygit
bind d display-popup -w 85% -h 85% -S "bg=default,fg=default" -b rounded -E lazydocker
bind h display-popup -w 85% -h 85% -S "bg=default,fg=default" -b rounded -E "gh dash"

set -g status-right-length 100
set -g status-left-length 100
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_variant 'dawn'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'rose-pine/tmux'
run '~/.tmux/plugins/tpm/tpm'

# Starship-style Pills
set -g status-style "bg=default"
setw -g window-status-style "bg=default"
setw -g window-status-current-style "bg=default"
set -g status-left "#[fg=black,bg=default]#[bg=black,fg=magenta] 󰧱 #[fg=white]#S #[fg=black,bg=default] "
set -g status-right "#[fg=black,bg=default]#[bg=black,fg=white] %I:%M%P #[fg=cyan]󰴈 #[fg=black,bg=default] #[fg=black,bg=default]#[bg=black,fg=blue] 󰒋 #[fg=white]#h #[fg=black,bg=default] "
set -g window-status-format "#[fg=black,bg=default]#[bg=black,fg=white] #I #W #[fg=black,bg=default] "
set -g window-status-current-format "#[fg=black,bg=default]#[bg=black,fg=yellow] #I #[fg=white]#W #[fg=black,bg=default] "
set -g window-status-separator " "

set-window-option -g popup-style "bg=default"
set-window-option -g mode-style "bg=default,fg=default,reverse"
set-option -g message-style "bg=default,fg=default,reverse"
