# tmux colorscheme (Boxy & Colorful)
set -g status-position bottom
set -g status-justify "left"
set -g status-style "bg=#282828,fg=#ebdbb2"

# Status left (Session name in a distinct color)
set -g status-left-length 100
set -g status-left "#[fg=#282828,bg=#458588,bold]  #S #[fg=#458588,bg=#282828] "

# Windows (Vibrant Active vs Muted Inactive)
set -g window-status-separator ""
set -g window-status-format "#[fg=#282828,bg=#928374] #I #W "
set -g window-status-current-format "#[fg=#282828,bg=#98971a,bold] #I #W "

# Status right (Colorful segments)
set -g status-right-length 100
set -g status-right "#[fg=#282828,bg=#d79921] 󰃭 %Y-%m-%d #[fg=#282828,bg=#b16286]  #{pane_current_path} #[fg=#282828,bg=#689d6a]  #(whoami) "

# Message and borders
set -g message-style "bg=#504945,fg=#ebdbb2,bold"
set -g pane-border-style "fg=#928374"
set -g pane-active-border-style "fg=#98971a"
