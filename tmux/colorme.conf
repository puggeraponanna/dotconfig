# Export colors as variables for use in tmux.conf
set -g @colorme_bg "#232136"
set -g @colorme_fg "#e0def4"
set -g @colorme_surface0 "#2a273f"
set -g @colorme_overlay0 "#6e6a86"
set -g @colorme_red "#eb6f92"
set -g @colorme_green "#3e8fb0"
set -g @colorme_yellow "#f6c177"
set -g @colorme_blue "#c4a7e7"
set -g @colorme_magenta "#ea9a97"
set -g @colorme_cyan "#9ccfd8"
set -g @colorme_orange "#f6c177"
set -g @colorme_bright_red "#eb6f92"
set -g @colorme_bright_green "#3e8fb0"
set -g @colorme_bright_yellow "#f6c177"
set -g @colorme_bright_blue "#c4a7e7"
set -g @colorme_bright_magenta "#ea9a97"
set -g @colorme_bright_cyan "#9ccfd8"
set -g @colorme_bright_orange "#f6c177"

# tmux colorscheme (Boxy & Colorful)
set -g status-position bottom
set -g status-justify "left"
set -g status-style "bg=#232136,fg=#e0def4"

# Status left (Session name in a distinct color)
set -g status-left-length 100
set -g status-left "#[fg=#232136,bg=#c4a7e7,bold]  #S #[fg=#c4a7e7,bg=#232136] "

# Windows (Vibrant Active vs Muted Inactive)
set -g window-status-separator ""
set -g window-status-format "#[fg=#232136,bg=#6e6a86] #I #W "
set -g window-status-current-format "#[fg=#232136,bg=#3e8fb0,bold] #I #W "

# Status right (Colorful segments)
set -g status-right-length 100
set -g status-right "#[fg=#232136,bg=#f6c177] 󰃭 %Y-%m-%d #[fg=#232136,bg=#ea9a97]  #{pane_current_path} #[fg=#232136,bg=#9ccfd8]  #(whoami) "

# Message and borders
set -g message-style "bg=#2a273f,fg=#e0def4,bold"
set -g pane-border-style "fg=#6e6a86"
set -g pane-active-border-style "fg=#3e8fb0"
