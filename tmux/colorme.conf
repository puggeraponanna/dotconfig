# Export colors as variables for use in tmux.conf
set -g @colorme_bg "#282c34"
set -g @colorme_fg "#abb2bf"
set -g @colorme_surface0 "#3e4452"
set -g @colorme_overlay0 "#5c6370"
set -g @colorme_red "#e06c75"
set -g @colorme_green "#98c379"
set -g @colorme_yellow "#e5c07b"
set -g @colorme_blue "#61afef"
set -g @colorme_magenta "#c678dd"
set -g @colorme_cyan "#56b6c2"
set -g @colorme_orange "#d19a66"
set -g @colorme_bright_red "#e06c75"
set -g @colorme_bright_green "#98c379"
set -g @colorme_bright_yellow "#e5c07b"
set -g @colorme_bright_blue "#61afef"
set -g @colorme_bright_magenta "#c678dd"
set -g @colorme_bright_cyan "#56b6c2"
set -g @colorme_bright_orange "#d19a66"

# tmux colorscheme (Boxy & Colorful)
set -g status-position bottom
set -g status-justify "left"
set -g status-style "bg=#282c34,fg=#abb2bf"

# Status left (Session name in a distinct color)
set -g status-left-length 100
set -g status-left "#[fg=#282c34,bg=#61afef,bold]  #S #[fg=#61afef,bg=#282c34] "

# Windows (Vibrant Active vs Muted Inactive)
set -g window-status-separator ""
set -g window-status-format "#[fg=#282c34,bg=#5c6370] #I #W "
set -g window-status-current-format "#[fg=#282c34,bg=#98c379,bold] #I #W "

# Status right (Colorful segments)
set -g status-right-length 100
set -g status-right "#[fg=#282c34,bg=#e5c07b] 󰃭 %Y-%m-%d #[fg=#282c34,bg=#c678dd]  #{pane_current_path} #[fg=#282c34,bg=#56b6c2]  #(whoami) "

# Message and borders
set -g message-style "bg=#3e4452,fg=#abb2bf,bold"
set -g pane-border-style "fg=#5c6370"
set -g pane-active-border-style "fg=#98c379"
