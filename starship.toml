[git_status]
disabled = false
style = "bg:overlay fg:love"
format = '[î‚¶](fg:overlay)([$all_status$ahead_behind]($style))[î‚´](fg:overlay) '
up_to_date = '[ âœ“ ](bg:overlay fg:iris)'
